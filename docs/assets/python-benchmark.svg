<svg xmlns="http://www.w3.org/2000/svg" width="960" height="548" viewBox="0 0 960 548" role="img" aria-labelledby="title desc">
<title id="title">ngh2 and h2 Python benchmark</title>
<desc id="desc">Relative throughput for five HTTP/2 scenarios. Higher is faster; h2 4.3.0 is the 1.00 baseline.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.canvas{fill:#fbfbfd}.primary{fill:#1d1d1f}.secondary{fill:#6e6e73}.grid{stroke:#e5e5ea}
.candidate{fill:#3a6ea5}.reference{fill:#c7c7cc}
</style>
<rect class="canvas" width="960" height="548"/>
<text class="secondary" x="40" y="27" font-size="11" font-weight="500" letter-spacing="1.4">PYTHON · HTTP/2</text>
<text class="primary" x="40" y="58" font-size="25" font-weight="500" letter-spacing="-0.4">Relative throughput by scenario</text>
<text class="secondary" x="40" y="83" font-size="13">h2 4.3.0 = 1.00× · higher is faster · latency per exchange</text>
<line class="grid" x1="360.0" y1="108" x2="360.0" y2="492"/>
<text class="secondary" x="360.0" y="102" text-anchor="middle" font-size="10">0×</text>
<line class="grid" x1="492.5" y1="108" x2="492.5" y2="492"/>
<text class="secondary" x="492.5" y="102" text-anchor="middle" font-size="10">8×</text>
<line class="grid" x1="625.0" y1="108" x2="625.0" y2="492"/>
<text class="secondary" x="625.0" y="102" text-anchor="middle" font-size="10">16×</text>
<line class="grid" x1="757.5" y1="108" x2="757.5" y2="492"/>
<text class="secondary" x="757.5" y="102" text-anchor="middle" font-size="10">24×</text>
<line class="grid" x1="890.0" y1="108" x2="890.0" y2="492"/>
<text class="secondary" x="890.0" y="102" text-anchor="middle" font-size="10">32×</text>
<text class="primary" x="40" y="139" font-size="13" font-weight="500">Small request/204 round trip</text>
<text class="secondary" x="40" y="161" font-size="11">2.58 µs vs 65.15 µs</text>
<text class="secondary" x="308" y="136" text-anchor="end" font-size="10">ngh2</text>
<rect class="candidate" x="360" y="124" width="418.7" height="15" rx="7.5"/>
<text class="primary" x="788.7" y="136" font-size="11" font-weight="500">25.3×</text>
<text class="secondary" x="308" y="159" text-anchor="end" font-size="10">h2 4.3.0</text>
<rect class="reference" x="360" y="147" width="16.6" height="10" rx="5"/>
<text class="primary" x="40" y="215" font-size="13" font-weight="500">Header block · 32 fields</text>
<text class="secondary" x="40" y="237" font-size="11">5.92 µs vs 145.05 µs</text>
<text class="secondary" x="308" y="212" text-anchor="end" font-size="10">ngh2</text>
<rect class="candidate" x="360" y="200" width="405.6" height="15" rx="7.5"/>
<text class="primary" x="775.6" y="212" font-size="11" font-weight="500">24.5×</text>
<text class="secondary" x="308" y="235" text-anchor="end" font-size="10">h2 4.3.0</text>
<rect class="reference" x="360" y="223" width="16.6" height="10" rx="5"/>
<text class="primary" x="40" y="291" font-size="13" font-weight="500">Fragmented request · 5 B</text>
<text class="secondary" x="40" y="313" font-size="11">2.85 µs vs 67.18 µs</text>
<text class="secondary" x="308" y="288" text-anchor="end" font-size="10">ngh2</text>
<rect class="candidate" x="360" y="276" width="390.2" height="15" rx="7.5"/>
<text class="primary" x="760.2" y="288" font-size="11" font-weight="500">23.6×</text>
<text class="secondary" x="308" y="311" text-anchor="end" font-size="10">h2 4.3.0</text>
<rect class="reference" x="360" y="299" width="16.6" height="10" rx="5"/>
<text class="primary" x="40" y="367" font-size="13" font-weight="500">Request body · 32 KiB</text>
<text class="secondary" x="40" y="389" font-size="11">7.55 µs vs 131.48 µs</text>
<text class="secondary" x="308" y="364" text-anchor="end" font-size="10">ngh2</text>
<rect class="candidate" x="360" y="352" width="288.4" height="15" rx="7.5"/>
<text class="primary" x="658.4" y="364" font-size="11" font-weight="500">17.4×</text>
<text class="secondary" x="308" y="387" text-anchor="end" font-size="10">h2 4.3.0</text>
<rect class="reference" x="360" y="375" width="16.6" height="10" rx="5"/>
<text class="primary" x="40" y="443" font-size="13" font-weight="500">Multiplexed batch · 100 streams</text>
<text class="secondary" x="40" y="465" font-size="11">1.83 µs vs 52.04 µs</text>
<text class="secondary" x="308" y="440" text-anchor="end" font-size="10">ngh2</text>
<rect class="candidate" x="360" y="428" width="472.0" height="15" rx="7.5"/>
<text class="primary" x="842.0" y="440" font-size="11" font-weight="500">28.5×</text>
<text class="secondary" x="308" y="463" text-anchor="end" font-size="10">h2 4.3.0</text>
<rect class="reference" x="360" y="451" width="16.6" height="10" rx="5"/>
<text class="secondary" x="40" y="518" font-size="10">ngh2 0.1.0 · h2 4.3.0 · CPython 3.12.13 (64-bit)</text>
<text class="secondary" x="40" y="535" font-size="10">Apple M4 · macOS-26.5.2-arm64-arm-64bit · 2026-07-20</text>
</svg>
